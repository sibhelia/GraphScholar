<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/graphscholar-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GraphScholar — Akademik Araştırma Platformu</title>
    <meta name="description" content="Makalelerinizi yapay zeka ile analiz edin, graf veritabanında ilişkilendirin ve akıllı asistanla derinlemesine araştırma yapın." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
<script>
window.addEventListener('error', function(e) {
  document.body.innerHTML += '<div style=\"color:red; background:white; position:fixed; top:0; left:0; z-index:9999; padding:20px; font-family:monospace; font-size:16px;\">' + e.error.stack.replace(/\n/g, '<br>') + '</div>';
});
window.addEventListener('unhandledrejection', function(e) {
  document.body.innerHTML += '<div style=\"color:red; background:white; position:fixed; top:0; left:0; z-index:9999; padding:20px; font-family:monospace; font-size:16px;\">' + (e.reason && e.reason.stack ? e.reason.stack.replace(/\n/g, '<br>') : e.reason) + '</div>';
});
</script>
